name: Run Unit Tests

on: [push]

jobs:
  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
      - run: npm run test
